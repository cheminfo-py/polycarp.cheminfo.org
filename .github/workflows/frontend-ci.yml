name: Frontend CI

# Type-check, lint, format-check and build the frontend on every PR, so
# regressions are caught before review. The repo previously had no
# PR-level checks — only tag/main-push Docker and release workflows.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Matches the node version the production image is built with
          # (see Dockerfile: node:24-alpine).
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check-types
      - run: npm run eslint
      - run: npm run prettier
      - run: npm run build
