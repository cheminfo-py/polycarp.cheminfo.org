# Cloudflare Tunnel deployment — no port published on the host.
#
# Cloudflare dashboard (https://dash.cloudflare.com):
#   Networking → Tunnels → Create a tunnel → Cloudflared connector →
#   copy the token into .env as CLOUDFLARE_TUNNEL_TOKEN=... → open the tunnel →
#   Published applications tab → add application with
#   Service = HTTP, URL = frontend:80.
#
# Copy this file to compose.yaml and run: docker compose up -d
services:
  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    restart: unless-stopped
    stop_grace_period: 10s
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 1
    pids_limit: 64
    ulimits:
      core: 0
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'

  frontend:
    image: ghcr.io/cheminfo-py/polycarp.cheminfo.org:latest
    build: .
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    ulimits:
      core: 0
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    tmpfs:
      - /var/cache/nginx:size=50m
      - /var/run:size=10m
      - /tmp:size=10m
    networks:
      - internal
    depends_on:
      - backend

  backend:
    image: ${BACKEND_IMAGE}
    env_file: .env
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 8g
    cpus: 2
    pids_limit: 128
    ulimits:
      core: 0
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    networks:
      - internal

networks:
  internal:
