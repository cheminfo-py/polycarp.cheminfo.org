services:
  frontend:
    build: .
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 64
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    tmpfs:
      - /var/cache/nginx:size=50m
      - /var/run:size=10m
      - /tmp:size=10m
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.polycarp-frontend.rule=Host(`polycarp.cheminfo.org`)
      - traefik.http.routers.polycarp-frontend.entrypoints=websecure
      - traefik.http.routers.polycarp-frontend.tls=true
      - traefik.http.routers.polycarp-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.polycarp-frontend.loadbalancer.server.port=80

  backend:
    image: ghcr.io/lamalab-org/copolymer-reactivity:latest
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2'
          pids: 128
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.polycarp-backend.rule=Host(`polycarp.cheminfo.org`) && PathPrefix(`/api/`)
      - traefik.http.routers.polycarp-backend.entrypoints=websecure
      - traefik.http.routers.polycarp-backend.tls=true
      - traefik.http.routers.polycarp-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.polycarp-backend.middlewares=polycarp-strip-api
      - traefik.http.middlewares.polycarp-strip-api.stripprefix.prefixes=/api
      - traefik.http.services.polycarp-backend.loadbalancer.server.port=8000

networks:
  traefik:
    external: true
