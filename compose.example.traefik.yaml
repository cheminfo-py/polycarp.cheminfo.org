# Traefik reverse-proxy deployment.
# Requires an existing Traefik instance on an external Docker network named "traefik"
# with a "websecure" entrypoint and a "letsencrypt" cert resolver.
# Adjust the Host(...) label to your chosen hostname (default: polycarp.cheminfo.org).
# Copy this file to compose.yaml and run: docker compose up -d
services:
  frontend:
    image: ghcr.io/cheminfo-py/polycarp.cheminfo.org:latest
    build: .
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    ulimits:
      core: 0
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    tmpfs:
      - /var/cache/nginx:size=50m
      - /var/run:size=10m
      - /tmp:size=10m
    networks:
      - default
      - traefik
    depends_on:
      - backend
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.polycarp-frontend.rule=Host(`${DOMAIN:-polycarp.cheminfo.org}`)'
      - 'traefik.http.routers.polycarp-frontend.entrypoints=websecure'
      - 'traefik.http.routers.polycarp-frontend.tls.certresolver=letsencrypt'
      - 'traefik.http.services.polycarp-frontend.loadbalancer.server.port=80'

  backend:
    image: ${BACKEND_IMAGE}
    env_file: .env
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 8g
    cpus: 2
    pids_limit: 128
    ulimits:
      core: 0
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    networks:
      - default
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.polycarp-backend.rule=Host(`${DOMAIN:-polycarp.cheminfo.org}`) && PathPrefix(`/api/`)'
      - 'traefik.http.routers.polycarp-backend.entrypoints=websecure'
      - 'traefik.http.routers.polycarp-backend.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.polycarp-backend.middlewares=polycarp-strip-api'
      - 'traefik.http.middlewares.polycarp-strip-api.stripprefix.prefixes=/api'
      - 'traefik.http.services.polycarp-backend.loadbalancer.server.port=8000'

networks:
  traefik:
    external: true
