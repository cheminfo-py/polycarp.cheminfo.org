services:
  frontend:
    # Use the released image by default. To build locally instead, run:
    #   docker compose up -d --build
    image: ghcr.io/cheminfo-py/polycarp.cheminfo.org:latest
    build: .
    restart: unless-stopped
    stop_grace_period: 3s
    ports:
      - '8080:80'
    depends_on:
      - backend

  backend:
    image: ${BACKEND_IMAGE}
    env_file: .env
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - '8000:8000'
