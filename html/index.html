<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PolyCarp: Copolymer Reactivity Prediction</title>
    <meta
      name="description"
      content="Interactive tool for predicting copolymer reactivity ratios."
    />
    <style>
      #ci-visualizer {
        min-height: 100vh;
      }

      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="ci-visualizer"
      data-ci-view="https://couch.cheminfo.org/cheminfo-public/7fe222bb1ecb56c6c941ac6fcab63053/view.json"
      data-ci-config="./visualizer/config.json"
    ></div>
    <script>
      var version = new URLSearchParams(window.location.search).get('v') || 'latest';
      var prefix = 'https://www.lactame.com/visualizer/' + version;
      var script = document.createElement('script');
      script.setAttribute('data-main', prefix + '/init');
      script.setAttribute('src', prefix + '/components/requirejs/require.js');
      document.head.appendChild(script);
    </script>
  </body>
</html>
